version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: endo
      POSTGRES_PASSWORD: endo
      POSTGRES_DB: endo_bot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U endo -d endo_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://endo:endo@postgres:5432/endo_bot
      DATABASE_URL_SYNC: postgresql+psycopg2://endo:endo@postgres:5432/endo_bot
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    ports:
      - "8000:8000"

  # Multi-bot orchestrator. One long-lived process that reads the `bots` table
  # and supervises one Telegram Application per row. Replaces the legacy
  # single-bot `bot/main.py` — running both at once causes Telegram Conflict
  # 409s (two getUpdates pollers on the same token), which is exactly what
  # broke the original bot when a second schema/bot was introduced.
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile.orchestrator
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      DATABASE_URL: postgresql+asyncpg://endo:endo@postgres:5432/endo_bot
      API_BASE_URL: http://backend:8000/api

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - admin
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

volumes:
  pgdata:
